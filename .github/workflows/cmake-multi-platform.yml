# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false
      
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x86_64
          - os: ubuntu-22.04-arm
            arch: arm64

    steps:
    - uses: actions/checkout@v4

    - name: Add LLVM apt repository
      run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-20 main"
          sudo apt-get update

    - name: Install dependencies
      run: | 
        sudo apt-get install -y build-essential ninja-build cmake ccache llvm-20-dev

    - name: Configure CMake
      working-directory: Babel
      run: |
        cmake -B build -G Ninja \
        -DCMAKE_BUILD_TYPE=Release \
        -DLLVM_DIR=/usr/lib/llvm-20/lib/cmake/llvm \
        -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"

    - name: Build
      working-directory: Babel
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build build --parallel
      
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove Chocolatey LLVM
        run: choco uninstall llvm -y
      
      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: C:/LLVM
          key: llvm-20.1.6-windows-x64

      - name: Install LLVM 20
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-20.1.6/clang+llvm-20.1.6-x86_64-pc-windows-msvc.tar.xz"
          Invoke-WebRequest -Uri $url -OutFile "llvm.tar.xz"
          tar -xf llvm.tar.xz
          Move-Item "clang+llvm-20.1.6-x86_64-pc-windows-msvc" "C:/LLVM"     

      - name: Configure CMake
        working-directory: Babel
        run: |
          cmake -B build -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR="C:/Program Files/LLVM/lib/cmake/llvm"

      - name: Build
        working-directory: Babel
        run: cmake --build build --config Release --parallel
