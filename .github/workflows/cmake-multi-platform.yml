# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false
      
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x86_64
          - os: ubuntu-22.04-arm
            arch: arm64

    steps:
    - uses: actions/checkout@v4

    - name: Install LLVM Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ninja-build cmake ccache llvm-dev

    - name: Configure CMake
      working-directory: Babel
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"

    - name: Build
      working-directory: Babel
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build build --parallel
      
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        run: choco install llvm --version=20.1.0 -y

      - name: Configure CMake
        working-directory: Babel
        run: |
          cmake -B build -G "Visual Studio 17 2022" \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR="C:/Program Files/LLVM/lib/cmake/llvm"

      - name: Build
        working-directory: Babel
        run: cmake --build build --config Release --parallel
