name: Build Linux Sysroots

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/sysroots.yml'

jobs:
  build-sysroot:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - arch: x86_64
            triple: x86_64-linux-gnu
            debarch: amd64
          - arch: aarch64
            triple: aarch64-linux-gnu
            debarch: arm64

    steps:
      - name: Install dpkg + multiarch support
        run: |
          sudo dpkg --add-architecture ${{ matrix.debarch }}
          sudo apt-get update

      - name: Download required packages (no install, just fetch .deb)
        run: |
          mkdir -p debs
          cd debs
          apt-get download \
            libc6:${{ matrix.debarch }} \
            libc6-dev:${{ matrix.debarch }} \
            linux-libc-dev:${{ matrix.debarch }} \
            libgcc-s1:${{ matrix.debarch }}

      - name: Extract .deb packages
        run: |
          mkdir -p extracted
          for f in debs/*.deb; do
            dpkg-deb -x "$f" extracted/
          done

      - name: Assemble minimal sysroot (symlinks resolved to real files)
        run: |
          set -e
          SYSROOT=sysroot-${{ matrix.triple }}
          TRIPLE=${{ matrix.triple }}
          mkdir -p "$SYSROOT/lib/$TRIPLE" "$SYSROOT/usr/lib/$TRIPLE"

          LIBDIR="extracted/usr/lib/$TRIPLE"
          LIBDIR_ROOT="extracted/lib/$TRIPLE"

          # -L dereferences symlinks, copying actual file content instead
          cp -L "$LIBDIR"/crt1.o "$SYSROOT/usr/lib/$TRIPLE/"
          cp -L "$LIBDIR"/Scrt1.o "$SYSROOT/usr/lib/$TRIPLE/"
          cp -L "$LIBDIR"/crti.o "$SYSROOT/usr/lib/$TRIPLE/"
          cp -L "$LIBDIR"/crtn.o "$SYSROOT/usr/lib/$TRIPLE/"

          cp -L "$LIBDIR"/libc.so "$SYSROOT/usr/lib/$TRIPLE/" 2>/dev/null || true
          cp -L "$LIBDIR_ROOT"/libc.so.6 "$SYSROOT/lib/$TRIPLE/"
          cp -L "$LIBDIR_ROOT"/libm.so.6 "$SYSROOT/lib/$TRIPLE/"
          cp -L "$LIBDIR_ROOT"/libdl.so.6 "$SYSROOT/lib/$TRIPLE/" 2>/dev/null || true
          cp -L "$LIBDIR_ROOT"/libpthread.so.6 "$SYSROOT/lib/$TRIPLE/" 2>/dev/null || true
          cp -L "$LIBDIR_ROOT"/librt.so.6 "$SYSROOT/lib/$TRIPLE/" 2>/dev/null || true
          find extracted -name 'libgcc_s.so.1' -exec cp -L {} "$SYSROOT/lib/$TRIPLE/" \;

          cp -L "$LIBDIR"/libc_nonshared.a "$SYSROOT/usr/lib/$TRIPLE/" 2>/dev/null || true

          find extracted/lib* -name 'ld-linux*.so*' -exec cp -L {} "$SYSROOT/lib/$TRIPLE/" \;

          # Sanity check: confirm nothing in the sysroot is still a symlink
          if find "$SYSROOT" -type l | grep -q .; then
            echo "ERROR: symlinks remain in sysroot:"
            find "$SYSROOT" -type l
            exit 1
          fi

          ls -la "$SYSROOT/lib/$TRIPLE" "$SYSROOT/usr/lib/$TRIPLE"

      - name: Verify with a smoke-test link
        run: |
          set -e
          sudo apt-get install -y clang lld
          echo 'int main(){return 0;}' > test.c
          clang --target=${{ matrix.triple }} -c test.c -o test.o
          clang -fuse-ld=lld --target=${{ matrix.triple }} \
            --sysroot=$(pwd)/sysroot-${{ matrix.triple }} \
            -v \
            -o test_exe test.o
          echo "Link succeeded"
          file test_exe

      - name: Package sysroot as zip
        run: |
          cd sysroot-${{ matrix.triple }}
          zip -r ../sysroot-${{ matrix.triple }}.zip .
          cd ..

      - name: Upload sysroot artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysroot-${{ matrix.triple }}
          path: sysroot-${{ matrix.triple }}.zip
          if-no-files-found: error
          retention-days: 90