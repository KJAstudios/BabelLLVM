name: CMake for Windows

on:
  workflow_call:
  workflow_dispatch:

jobs:
   build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache LLVM build
        id: cache-llvm
        uses: actions/cache/restore@v4
        with:
          path: C:/LLVM
          key: llvm-20.1.6-windows-x64-v1

      # build and cache llvm, since the downloads don't contain the necessary cmake files
      - name: Checkout LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: llvm/llvm-project
          ref: llvmorg-20.1.6
          path: llvm-project
          sparse-checkout: |
            llvm
            cmake

      - name: Build LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          cmake -S llvm-project/llvm -B llvm-build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="C:/LLVM" `
            -DLLVM_TARGETS_TO_BUILD="X86;AArch64" `
            -DLLVM_ENABLE_PROJECTS="" `
            -DLLVM_INCLUDE_TESTS=OFF `
            -DLLVM_INCLUDE_EXAMPLES=OFF `
            -DLLVM_INCLUDE_BENCHMARKS=OFF `
            -DLLVM_INCLUDE_DOCS=OFF
          cmake --build llvm-build --config Release --parallel
          cmake --install llvm-build --config Release


      - name: Save LLVM cache
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: C:/LLVM
          key: llvm-20.1.6-windows-x64-v1

      - name: Cache llvm-mingw
        id: cache-llvm-mingw
        uses: actions/cache/restore@v4
        with: 
          path: C:/llvm-mingw
          key: llvm-mingw-20260602
      
      # cache llvm-mingw for clang/build dependencies
      - name: Download llvm-mingw
        if: steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        run: |
          $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/20260602/llvm-mingw-20260602-ucrt-x86_64.zip"
          Invoke-WebRequest $url -OutFile llvm-mingw.zip
          Expand-Archive llvm-mingw.zip -DestinationPath C:/llvm-mingw-tmp
          # Move the inner versioned folder up so bin/ is directly at C:/llvm-mingw/bin/
          $inner = Get-ChildItem C:/llvm-mingw-tmp | Select-Object -First 1
          Move-Item $inner.FullName C:/llvm-mingw
          Remove-Item C:/llvm-mingw-tmp

      - name: Save llvm-mingw cache
        if: steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: C:/llvm-mingw
          key: llvm-mingw-20260602

      # linux sysroots for cross-compilation
      - name: Cache Linux sysroots
        id: cache-sysroots
        uses: actions/cache/restore@v4
        with:
          path: C:/sysroots
          key: sysroots-windows-v1
      
      - name: Download Linux x86-64 sysroot
        if: steps.cache-sysroots.outputs.cache-hit != 'true'
        run: |
          New-Item -ItemType Directory -Force -Path C:/sysroots/x86_64-unknown-linux-gnu
          Invoke-WebRequest `
            "https://commondatastorage.googleapis.com/chrome-linux-sysroot/toolchain/4f611ec025be98214164d4bf9fbe8843f58533f7/debian_bullseye_amd64_sysroot.tar.xz" `
            -OutFile C:/tmp-sysroot-x86_64.tar.xz
          tar -xf C:/tmp-sysroot-x86_64.tar.xz -C C:/sysroots/x86_64-unknown-linux-gnu
 
      - name: Download Linux ARM64 sysroot
        if: steps.cache-sysroots.outputs.cache-hit != 'true'
        run: |
          New-Item -ItemType Directory -Force -Path C:/sysroots/aarch64-unknown-linux-gnu
          Invoke-WebRequest `
            "https://commondatastorage.googleapis.com/chrome-linux-sysroot/toolchain/906cc7c6bf47d4bd969a3221fc0602c6b3153caa/debian_bullseye_arm64_sysroot.tar.xz" `
            -OutFile C:/tmp-sysroot-arm64.tar.xz
          tar -xf C:/tmp-sysroot-arm64.tar.xz -C C:/sysroots/aarch64-unknown-linux-gnu

      - name: Save Linux sysroots cache
        if: steps.cache-sysroots.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: C:/sysroots
          key: sysroots-windows-v1

      # build

      - name: Configure CMake
        working-directory: Babel
        run: cmake -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DLLVM_DIR="C:/LLVM/lib/cmake/llvm"

      - name: Build
        working-directory: Babel
        run: cmake --build build --parallel

      - name: Install
        working-directory: Babel
        run: cmake --install build --prefix staging

      - name: Package compiler dependencies
        working-directory: Babel
        run: |
          mkdir staging/dependencies/lib
          mkdir staging/dependencies/bin

          # copy over clang and clang's dependencies
          cp C:/llvm-mingw/bin/clang.exe staging/dependencies/bin/
          cp C:/llvm-mingw/bin/clang-22.exe staging/dependencies/bin/
          cp C:/llvm-mingw/bin/ld.lld.exe staging/dependencies/bin/
          cp C:/llvm-mingw/bin/*.dll staging/dependencies/bin/

          # make sure to include the clang license
          cp C:/llvm-mingw/LICENSE.TXT staging/dependencies/LLVM-LICENSE.TXT

          $resourceDir = & "C:/llvm-mingw/bin/clang.exe" --print-resource-dir
          mkdir staging/dependencies/lib/clang/22
          cp -r $resourceDir staging/dependencies/lib/clang

#      - name: Package sysroots
#        working-directory: Babel
#        run: |
#          New-Item -ItemType Directory -Force -Path staging/dependencies/sysroots
#
#          robocopy C:/sysroots/x86_64-unknown-linux-gnu `
#            staging/dependencies/sysroots/x86_64-unknown-linux-gnu /E /NFL /NDL /NJH /NJS
#          if ($LASTEXITCODE -le 7) { $LASTEXITCODE = 0 }
#
#          robocopy C:/sysroots/aarch64-unknown-linux-gnu `
#            staging/dependencies/sysroots/aarch64-unknown-linux-gnu /E /NFL /NDL /NJH /NJS
#          if ($LASTEXITCODE -le 7) { $LASTEXITCODE = 0 }
# 
#          # Windows sysroot comes from llvm-mingw (just the MinGW target dir)
#          New-Item -ItemType Directory -Force -Path staging/dependencies/sysroots/x86_64-w64-windows-gnu
#          cp -r C:/llvm-mingw/x86_64-w64-mingw32 staging/dependencies/sysroots/x86_64-w64-windows-gnu/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: babel-windows-x64
          path: Babel/staging

      

