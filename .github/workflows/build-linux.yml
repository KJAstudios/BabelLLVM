name: CMake for Linux

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - os: ubuntu-22.04
            arch: x86_64
          - os: ubuntu-22.04-arm
            arch: arm64

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: sudo apt-get install -y ninja-build cmake build-essential python3

    - name: Unpack linux sysroots
      working-directory: Babel/PackagedFiles/dependencies/sysroots
      run: |
        for triple in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-w64-windows-gnu; do
          mkdir -p "$triple"
          unzip -o "${triple}.zip" -d "$triple"
          rm "${triple}.zip"
        done


    # /opt is root-owned; give the runner write access before cache restore tries to extract there
    - name: Prepare LLVM install directory
      run: sudo mkdir -p /opt/llvm && sudo chown $(id -u):$(id -g) /opt/llvm

    - name: Cache LLVM/Clang/LLD build
      id: cache-llvm-core
      uses: actions/cache/restore@v4
      with:
        path: /opt/llvm
        key: llvm-core-20.1.6-linux-${{ matrix.arch }}-v1

    - name: Checkout LLVM
      if: steps.cache-llvm-core.outputs.cache-hit != 'true'
      uses: actions/checkout@v4
      with:
        repository: llvm/llvm-project
        ref: llvmorg-20.1.6
        path: llvm-project
        sparse-checkout: |
          llvm
          clang
          lld
          compiler-rt
          cmake
          libunwind
          runtimes

    - name: Build LLVM, Clang, and LLD
      if: steps.cache-llvm-core.outputs.cache-hit != 'true'
      run: |
        cmake -S llvm-project/llvm -B llvm-build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/opt/llvm \
          -DLLVM_TARGETS_TO_BUILD="X86;AArch64" \
          -DLLVM_ENABLE_PROJECTS="clang;lld" \
          -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++" \
          -DLLVM_INCLUDE_TESTS=OFF \
          -DLLVM_INCLUDE_EXAMPLES=OFF \
          -DLLVM_INCLUDE_BENCHMARKS=OFF \
          -DLLVM_INCLUDE_DOCS=OFF
        cmake --build llvm-build --parallel
        cmake --install llvm-build

    - name: Save LLVM/Clang/LLD cache
      if: steps.cache-llvm-core.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: /opt/llvm
        key: llvm-core-20.1.6-linux-${{ matrix.arch }}-v1

    - name: Cache compiler-rt + libunwind builds
      id: cache-runtimes
      uses: actions/cache/restore@v4
      with:
        path: |
          /opt/llvm/lib/clang/20/lib
          /opt/llvm/lib/x86_64-unknown-linux-gnu
          /opt/llvm/lib/aarch64-unknown-linux-gnu
          /opt/llvm/lib/x86_64-w64-windows-gnu
        key: llvm-runtimes-20.1.6-linux-${{ matrix.arch }}-v1

    # Need the LLVM source checked out even on a runtimes cache-hit-but-core-miss edge case;
    # this is idempotent if llvm-project already exists from the step above
    - name: Checkout LLVM (for runtimes build)
      if: steps.cache-runtimes.outputs.cache-hit != 'true'
      uses: actions/checkout@v4
      with:
        repository: llvm/llvm-project
        ref: llvmorg-20.1.6
        path: llvm-project
        sparse-checkout: |
          compiler-rt
          libunwind
          runtimes
          cmake
          llvm

    - name: Build compiler-rt builtins for cross targets
      if: steps.cache-runtimes.outputs.cache-hit != 'true'
      run: |
        set -e
        for triple in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-w64-windows-gnu; do
          case "$triple" in
            *linux*)   system="Linux"   ;;
            *windows*) system="Windows" ;;
          esac
          cmake -S llvm-project/compiler-rt -B "compiler-rt-$triple" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/opt/llvm \
            -DCMAKE_C_COMPILER=/opt/llvm/bin/clang \
            -DCMAKE_ASM_COMPILER=/opt/llvm/bin/clang \
            -DCMAKE_C_COMPILER_TARGET="$triple" \
            -DCMAKE_ASM_COMPILER_TARGET="$triple" \
            -DCMAKE_AR=/opt/llvm/bin/llvm-ar \
            -DCMAKE_NM=/opt/llvm/bin/llvm-nm \
            -DCMAKE_RANLIB=/opt/llvm/bin/llvm-ranlib \
            -DCMAKE_SYSTEM_NAME="$system" \
            -DCMAKE_SYSROOT="$GITHUB_WORKSPACE/Babel/PackagedFiles/dependencies/sysroots/$triple" \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DLLVM_ENABLE_PER_TARGET_RUNTIME_DIR=ON \
            -DCOMPILER_RT_DEFAULT_TARGET_ONLY=ON \
            -DCOMPILER_RT_BUILD_BUILTINS=ON \
            -DCOMPILER_RT_BUILD_SANITIZERS=OFF \
            -DCOMPILER_RT_BUILD_XRAY=OFF \
            -DCOMPILER_RT_BUILD_LIBFUZZER=OFF \
            -DCOMPILER_RT_BUILD_PROFILE=OFF \
            -DCOMPILER_RT_BUILD_MEMPROF=OFF \
            -DCOMPILER_RT_BUILD_ORC=OFF 
          cmake --build "compiler-rt-$triple" --target install-builtins --parallel
        done

    - name: Build libunwind for cross targets
      if: steps.cache-runtimes.outputs.cache-hit != 'true'
      run: |
        set -e
        for triple in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-w64-windows-gnu; do
          case "$triple" in
            *linux*)   system="Linux"   ;;
            *windows*) system="Windows" ;;
          esac
          cmake -S llvm-project/libunwind -B "libunwind-$triple" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/opt/llvm \
            -DCMAKE_INSTALL_LIBDIR="lib/$triple" \
            -DCMAKE_C_COMPILER=/opt/llvm/bin/clang \
            -DCMAKE_CXX_COMPILER=/opt/llvm/bin/clang++ \
            -DCMAKE_ASM_COMPILER=/opt/llvm/bin/clang \
            -DCMAKE_C_COMPILER_TARGET="$triple" \
            -DCMAKE_CXX_COMPILER_TARGET="$triple" \
            -DCMAKE_ASM_COMPILER_TARGET="$triple" \
            -DCMAKE_AR=/opt/llvm/bin/llvm-ar \
            -DCMAKE_NM=/opt/llvm/bin/llvm-nm \
            -DCMAKE_RANLIB=/opt/llvm/bin/llvm-ranlib \
            -DCMAKE_SYSTEM_NAME="$system" \
            -DCMAKE_SYSROOT="$GITHUB_WORKSPACE/Babel/PackagedFiles/dependencies/sysroots/$triple" \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DLLVM_PATH="$GITHUB_WORKSPACE/llvm-project/llvm" \
            -DLIBUNWIND_ENABLE_SHARED=OFF \
            -DLIBUNWIND_ENABLE_STATIC=ON \
            -DLIBUNWIND_USE_COMPILER_RT=ON
          cmake --build "libunwind-$triple" --target unwind --parallel
          cmake --install "libunwind-$triple" --component unwind
        done

    - name: Debug builtins and libunwind location
      if: steps.cache-runtimes.outputs.cache-hit != 'true'
      run: |
        echo "Resource dir: $(/opt/llvm/bin/clang --print-resource-dir)"
        find /opt/llvm -iname "libclang_rt.builtins*"
        find /opt/llvm -iname "libunwind.a"

    - name: Save compiler-rt + libunwind cache
      if: steps.cache-runtimes.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          /opt/llvm/lib/clang/20/lib
          /opt/llvm/lib/x86_64-unknown-linux-gnu
          /opt/llvm/lib/aarch64-unknown-linux-gnu
          /opt/llvm/lib/x86_64-w64-windows-gnu
        key: llvm-runtimes-20.1.6-linux-${{ matrix.arch }}-v1

    # build

    - name: Configure CMake
      working-directory: Babel
      run: |
        cmake -B build -G Ninja \
        -DCMAKE_BUILD_TYPE=Release \
        -DLLVM_DIR=/opt/llvm/lib/cmake/llvm \
        -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"

    - name: Build
      working-directory: Babel
      run: cmake --build build --parallel

    - name: Install
      working-directory: Babel
      run: cmake --install build --prefix staging

    - name: Package compiler dependencies
      working-directory: Babel
      run: |
        mkdir -p staging/dependencies/lib staging/dependencies/bin

        cp /opt/llvm/bin/clang staging/dependencies/bin/
        cp /opt/llvm/bin/clang-20 staging/dependencies/bin/
        cp /opt/llvm/bin/ld.lld staging/dependencies/bin/
        cp /opt/llvm/bin/llvm-ar staging/dependencies/bin/
        cp /opt/llvm/bin/llvm-nm staging/dependencies/bin/
        cp /opt/llvm/bin/llvm-ranlib staging/dependencies/bin/
        cp /opt/llvm/bin/llvm-objcopy staging/dependencies/bin/

        # Fetch LLVM license
        wget -q https://raw.githubusercontent.com/llvm/llvm-project/llvmorg-20.1.6/LICENSE.TXT \
          -O staging/dependencies/LLVM-LICENSE.TXT

        # copy the clang resource dir (headers etc.)
        RESOURCE_DIR=$(/opt/llvm/bin/clang --print-resource-dir)
        mkdir -p staging/dependencies/lib/clang
        cp -r "$RESOURCE_DIR" staging/dependencies/lib/clang/20

        # copy builtins + libunwind per triple from their actual LLVM_ENABLE_PER_TARGET_RUNTIME_DIR location
        for triple in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-w64-windows-gnu; do
          mkdir -p "staging/dependencies/lib/clang/20/lib/$triple"
          if [ -f "/opt/llvm/lib/$triple/libclang_rt.builtins.a" ]; then
            cp "/opt/llvm/lib/$triple/libclang_rt.builtins.a" "staging/dependencies/lib/clang/20/lib/$triple/"
          else
            echo "WARNING: missing builtins for $triple"
          fi
          if [ -f "/opt/llvm/lib/$triple/libunwind.a" ]; then
            cp "/opt/llvm/lib/$triple/libunwind.a" "staging/dependencies/lib/clang/20/lib/$triple/"
          else
            echo "WARNING: missing libunwind for $triple"
          fi
        done

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: babel-linux-${{ matrix.arch }}
        path: Babel/staging