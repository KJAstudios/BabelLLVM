name: CMake for Linux

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false
      
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x86_64
          - os: ubuntu-22.04-arm
            arch: arm64

    steps:
    - uses: actions/checkout@v4

    - name: Add LLVM apt repository
      run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-20 main"
          sudo apt-get update

    - name: Install dependencies
      run: | 
        sudo apt-get install -y build-essential ninja-build cmake ccache llvm-20-dev clang-20 lld llvm-20

    # get sysroots
    - name: Cache sysroots
      id: cache-sysroots
      uses: actions/cache/restore@v4
      with:
        path: sysroots
        key: sysroots-linux-v1

    - name: Download Linux x86-64 sysroot
      if: steps.cache-sysroots.outputs.cache-hit != 'true'
      run: |
        mkdir -p sysroots/x86_64-unknown-linux-gnu
        wget -q https://commondatastorage.googleapis.com/chrome-linux-sysroot/toolchain/4f611ec025be98214164d4bf9fbe8843f58533f7/debian_bullseye_amd64_sysroot.tar.xz \
          -O /tmp/sysroot-x86_64.tar.xz
        tar -xf /tmp/sysroot-x86_64.tar.xz -C sysroots/x86_64-unknown-linux-gnu
 
    - name: Download Linux ARM64 sysroot
      if: steps.cache-sysroots.outputs.cache-hit != 'true'
      run: |
        mkdir -p sysroots/aarch64-unknown-linux-gnu
        wget -q https://commondatastorage.googleapis.com/chrome-linux-sysroot/toolchain/906cc7c6bf47d4bd969a3221fc0602c6b3153caa/debian_bullseye_arm64_sysroot.tar.xz \
          -O /tmp/sysroot-arm64.tar.xz
        tar -xf /tmp/sysroot-arm64.tar.xz -C sysroots/aarch64-unknown-linux-gnu
 
    - name: Download llvm-mingw (MinGW sysroot for Windows target)
      if: steps.cache-sysroots.outputs.cache-hit != 'true'
      run: |
        mkdir -p sysroots/x86_64-w64-windows-gnu
        wget -q https://github.com/mstorsjo/llvm-mingw/releases/download/20260602/llvm-mingw-20260602-ucrt-ubuntu-22.04-x86_64.tar.xz \
          -O /tmp/llvm-mingw.tar.xz
        # Extract only the sysroot portions (headers + CRT), not the compiler tools
        tar -xf /tmp/llvm-mingw.tar.xz -C /tmp/llvm-mingw-full --strip-components=1
        cp -r /tmp/llvm-mingw-full/x86_64-w64-mingw32 sysroots/x86_64-w64-windows-gnu/
        cp /tmp/llvm-mingw-full/LICENSE.TXT sysroots/x86_64-w64-windows-gnu/
    
    - name: Save sysroots cache
      if: steps.cache-sysroots.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: sysroots
        key: sysroots-linux-v1

    # build

    - name: Configure CMake
      working-directory: Babel
      run: |
        cmake -B build -G Ninja \
        -DCMAKE_BUILD_TYPE=Release \
        -DLLVM_DIR=/usr/lib/llvm-20/lib/cmake/llvm \
        -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"

    - name: Build
      working-directory: Babel
      run: cmake --build build --parallel 

    - name: Debug output
      run: |
        echo "=== Babel/build contents ==="
        find Babel/build -type f -name "babel-llvm"
        echo "=== Babel/staging contents ==="
        find Babel/staging -type f 2>/dev/null || echo "staging not found"

    - name: Install
      working-directory: Babel
      run: cmake --install build --prefix staging

    - name: Package compiler dependencies
      working-directory: Babel
      run: |
        mkdir -p staging/dependencies/lib
        cp $(which clang-20) staging/dependencies
        cp $(which lld) staging/dependencies
        cp -r $(clang-20 --print-resource-dir) staging/dependencies/lib/clang/
        # Fetch LLVM license
        wget -q https://raw.githubusercontent.com/llvm/llvm-project/llvmorg-20.1.6/LICENSE.TXT \
        -O staging/dependencies/LLVM-LICENSE.TXT

    - name: Package sysroots
      working-directory: Babel
      run: |
        mkdir -p staging/dependencies/sysroots
        cp -r ../sysroots/x86_64-unknown-linux-gnu  staging/dependencies/sysroots/
        cp -r ../sysroots/aarch64-unknown-linux-gnu staging/dependencies/sysroots/
        cp -r ../sysroots/x86_64-w64-windows-gnu    staging/dependencies/sysroots/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: babel-linux-${{ matrix.arch }}
        path: Babel/staging
